{% include 'Configurador Core' %}

<div id="mainContent" class="wrapper-body" role="main">
  <div class="cfg-wrap">
    {% include 'Configurador Stepper' current: 'resumen' %}

    <div class="rsm-wrap">
      <div class="rsm-back-row">
        <button type="button" class="cfg-btn cfg-btn-ghost" onclick="history.back()">Atrás</button>
      </div>
      <h2 class="cfg-h2">Resumen del pedido</h2>
      <p class="rsm-sub">Revisa tu configuración antes de confirmar el pedido.</p>

      <div class="rsm-card">
        <div class="rsm-head">Detalle de la configuración</div>
        <div id="rsmLines" class="rsm-lines"></div>
        <div class="rsm-total">
          <span>Total</span>
          <span class="rsm-total-amt" id="rsmTotal">—</span>
        </div>
      </div>

      <!-- Status/notification renders BELOW the summary card (was above it). -->
      <div id="cfgStatus" class="cfg-status" style="display:none;"></div>

      <div class="rsm-comment">
        <label class="rsm-comment-label" for="rsmComentario">¿Desea añadir algún comentario a su pedido?</label>
        <textarea id="rsmComentario" class="rsm-comment-box" rows="5" maxlength="10000"
                  placeholder="Escribe aquí cualquier comentario para tu pedido..."></textarea>
      </div>

      <div class="rsm-actions">
        <button type="button" id="rsmPresupuesto" class="cfg-btn cfg-btn-ghost rsm-ghost-cta" onclick="crearPresupuesto()">Crear Borrador</button>
        <button type="button" id="rsmCrear" class="cfg-btn cfg-btn-primary rsm-ghost-cta" onclick="solicitarPedido()">Solicitar Pedido</button>
        <button type="button" id="rsmNuevo" class="cfg-btn cfg-btn-primary" style="display:none;" onclick="nuevoPedido()">Nuevo pedido</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirmation modal (mirrors the stock / Detalle-Oportunidad modal pattern).
     Replaces the native confirm() for both save actions (Solicitar Pedido /
     Crear Borrador). The question text is set dynamically from rsmModal(). -->
<div id="rsmModal" class="rsm-modal-overlay rsm-hidden" role="dialog" aria-modal="true" aria-labelledby="rsmModalTitle" aria-hidden="true">
  <div class="rsm-modal" tabindex="-1">
    <h3 id="rsmModalTitle" class="rsm-modal-title">Confirmar pedido</h3>
    <p id="rsmModalBody" class="rsm-modal-body"></p>
    <div class="rsm-modal-actions">
      <button type="button" id="rsmModalNo" class="cfg-btn cfg-btn-ghost">Cancelar</button>
      <button type="button" id="rsmModalSi" class="cfg-btn cfg-btn-primary">Confirmar</button>
    </div>
  </div>
</div>

<style>
  .rsm-wrap { max-width: 760px; margin: 0 auto; }
  .rsm-sub { color: #6b7280; font-size: 1rem; margin: -0.6rem 0 1.25rem; }
  .rsm-card { background: #fff; border: 1px solid #eceef1; border-radius: 18px; box-shadow: 0 6px 28px rgba(0,0,0,0.08); overflow: hidden; }
  .rsm-head { padding: 1.1rem 1.6rem; font-size: 0.8rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; background: #2aa9e0; }
  .rsm-lines { padding: 0.2rem 1.6rem; }
  .rsm-line { display: flex; align-items: baseline; gap: 0.8rem; padding: 1.05rem 0; border-bottom: 1px solid #f0f2f5; }
  .rsm-line:last-child { border-bottom: none; }
  .rsm-line-info { flex: 1 1 auto; min-width: 0; }
  .rsm-line-step { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #9aa3b2; }
  .rsm-line-name { font-size: 1.08rem; font-weight: 600; color: #1f2a44; margin-top: 0.12rem; }
  .rsm-line-price { flex: 0 0 auto; font-size: 1.05rem; font-weight: 700; color: #1a2b4a; white-space: nowrap; }
  .rsm-total { display: flex; justify-content: space-between; align-items: center; padding: 1.3rem 1.6rem; background: #f6fbfe; border-top: 2px solid #1f2a44; }
  .rsm-total > span:first-child { font-size: 1.05rem; font-weight: 800; color: #1a2b4a; text-transform: uppercase; letter-spacing: 0.04em; }
  .rsm-total-amt { font-size: 1.9rem; font-weight: 800; color: #2aa9e0; }

  /* Status/notification sits directly below the summary card (moved down from
     above the card). Give it a top gap so it separates from the card when shown. */
  #cfgStatus { margin-top: 1.25rem; }

  /* ---- comment box ---- */
  .rsm-comment { margin-top: 1.5rem; }
  .rsm-comment-label { display: block; font-size: 1.05rem; font-weight: 700; color: #1f2a44; margin-bottom: 0.55rem; }
  .rsm-comment-box {
    width: 100%; box-sizing: border-box; min-height: 120px; padding: 0.85rem 1rem;
    border: 1px solid #d4d8e0; border-radius: 12px; font-family: inherit; font-size: 0.98rem;
    color: #1f2a44; resize: vertical;
  }
  .rsm-comment-box:focus { outline: none; border-color: #2aa9e0; box-shadow: 0 0 0 3px rgba(42,169,224,0.15); }

  /* ---- back button (top, above title) ---- */
  .rsm-back-row { margin-bottom: 1rem; }

  /* ---- actions ---- */
  .rsm-actions { display: flex; gap: 0.9rem; align-items: center; margin-top: 1.6rem; flex-wrap: wrap; }
  /* Bottom CTAs share the Atrás ghost look (.cfg-btn-ghost) but keep the larger
     action-row sizing so they fill the row like the previous CTAs. */
  .rsm-ghost-cta { flex: 1 1 auto; justify-content: center; padding: 1rem 1.6rem; font-size: 1.1rem; }
  .rsm-ghost-cta:disabled { opacity: 0.5; cursor: not-allowed; }
  .rsm-empty { color: #9aa3b2; font-size: 1rem; padding: 2rem 1.6rem; text-align: center; }

  /* ---- confirmation modal (mirrors stock / Detalle-Oportunidad pattern) ---- */
  .rsm-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
  .rsm-modal-overlay.rsm-hidden { display: none; }
  .rsm-modal { background: #fff; border-radius: 16px; box-shadow: 0 18px 50px rgba(20,35,59,0.28); width: 100%; max-width: 440px; padding: 1.7rem 1.7rem 1.4rem; font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif; color: #15233b; animation: rsmModalIn 0.18s ease-out; }
  @keyframes rsmModalIn { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .rsm-modal-title { font-size: 1.25rem; font-weight: 700; color: #15233b; margin: 0 0 0.6rem; letter-spacing: -0.01em; }
  .rsm-modal-body { font-size: 0.95rem; color: #45506a; line-height: 1.5; margin: 0 0 1.5rem; }
  .rsm-modal-actions { display: flex; justify-content: flex-end; gap: 0.7rem; flex-wrap: wrap; }
  .rsm-modal-actions .cfg-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<script>
  var SET_OPP = 'wi_oportunidadfarmings';
  var SET_LINE = 'wi_productlineitemses';
  var SET_PBF = 'wi_productobasefarmings';

  // Fase choice values (see option set): Presupuesto/Borrador = 1, Solicitud de pedido = 2
  var FASE_PRESUPUESTO = 1;
  var FASE_PEDIDO = 2;

  // Logged-in portal user: account (Company Name / parentcustomerid) + the contact itself; empty if anonymous
  var CUENTA_ID = '{{ user.parentcustomerid.id }}';
  var CONTACTO_ID = '{{ user.id }}';

  function esc(t) { var d = document.createElement('div'); d.textContent = (t == null ? '' : t); return d.innerHTML; }

  function showStatus(msg, kind) {
    var el = document.getElementById('cfgStatus');
    el.style.display = 'block';
    el.className = 'cfg-status ' + (kind || '');
    el.textContent = msg;
  }

  function actionBtns() { return [document.getElementById('rsmCrear'), document.getElementById('rsmPresupuesto')]; }
  function setBusy(b) { actionBtns().forEach(function (btn) { if (btn) btn.disabled = b; }); }

  function lineHtml(step, name, price) {
    var p = (price != null) ? window.CFG.fmt(price) : '';
    return '<div class="rsm-line"><div class="rsm-line-info"><div class="rsm-line-step">' + esc(step) +
           '</div><div class="rsm-line-name">' + esc(name) + '</div></div>' +
           '<div class="rsm-line-price">' + p + '</div></div>';
  }

  function render() {
    if (!window.CFG) return;
    var s = window.CFG.get();
    var box = document.getElementById('rsmLines');
    var html = '', any = false;
    window.CFG.STEPS.forEach(function (k) {
      if (k === 'opcionales' || k === 'resumen') return;
      var v = s[k];
      if (!v) return;
      any = true;
      html += lineHtml(window.CFG.LABEL[k], v.label, v.price);
    });
    if (s.opcionales && s.opcionales.length) {
      any = true;
      s.opcionales.forEach(function (o) { html += lineHtml('Opcional', o.label, o.price); });
    }
    box.innerHTML = any ? html : '<div class="rsm-empty">Aún no has seleccionado nada. Vuelve al configurador.</div>';
    document.getElementById('rsmTotal').textContent = window.CFG.fmt(window.CFG.total());

    var isEdit = !!(window.CFG.editId && window.CFG.editId());
    // enable actions when a model is chosen, OR always in edit mode (the opp
    // already exists; allow re-saving even if the model lookup wasn't restored)
    setBusy(!isEdit && !(s.productobase && s.productobase.id));

    // Edit-mode UI: reflect that we are editing an existing opportunity and
    // relabel the primary action. Pre-fill the comment box from the opp once.
    if (isEdit) {
      var sub = document.querySelector('.rsm-sub');
      if (sub) sub.textContent = 'Editando un pedido existente. Los cambios actualizarán el mismo pedido.';
      var crearBtn = document.getElementById('rsmCrear');
      if (crearBtn) crearBtn.textContent = 'Solicitar Pedido';
      var presupBtn = document.getElementById('rsmPresupuesto');
      if (presupBtn) presupBtn.textContent = 'Guardar Borrador';
      var ta = document.getElementById('rsmComentario');
      if (ta && !ta.dataset.prefilled && s.__comentarios) {
        ta.value = s.__comentarios;
        ta.dataset.prefilled = '1';
      }
    }
  }

  function nuevoPedido() {
    window.CFG.clear();
    location.href = '/cpq';
  }

  function getToken() {
    return new Promise(function (resolve) {
      if (window.shell && typeof shell.getTokenDeferred === 'function') {
        shell.getTokenDeferred().done(function (t) { resolve(t); }).fail(function () { resolve(null); });
      } else {
        var input = document.querySelector("[name='__RequestVerificationToken']");
        resolve(input ? input.value : null);
      }
    });
  }

  function apiCreate(set, payload, token) {
    return fetch('/_api/' + set, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json', 'Accept': 'application/json',
        'OData-MaxVersion': '4.0', 'OData-Version': '4.0',
        'Prefer': 'return=representation', '__RequestVerificationToken': token || ''
      },
      body: JSON.stringify(payload)
    }).then(function (res) {
      return res.text().then(function (txt) {
        if (!res.ok) throw new Error('HTTP ' + res.status + ' en ' + set + ': ' + txt);
        var id = null, loc = res.headers.get('OData-EntityId') || res.headers.get('Location');
        if (loc) { var m = loc.match(/\(([^)]+)\)/); if (m) id = m[1]; }
        return { data: txt ? JSON.parse(txt) : {}, id: id };
      });
    });
  }

  function apiPatch(set, id, payload, token) {
    return fetch('/_api/' + set + '(' + id + ')', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json', 'Accept': 'application/json',
        'OData-MaxVersion': '4.0', 'OData-Version': '4.0',
        '__RequestVerificationToken': token || ''
      },
      body: JSON.stringify(payload)
    }).then(function (res) {
      return res.text().then(function (txt) {
        if (!res.ok) throw new Error('HTTP ' + res.status + ' (PATCH) en ' + set + ': ' + txt);
        return txt ? JSON.parse(txt) : {};
      });
    });
  }

  function apiDelete(set, id, token) {
    return fetch('/_api/' + set + '(' + id + ')', {
      method: 'DELETE',
      headers: {
        'Accept': 'application/json', 'OData-MaxVersion': '4.0', 'OData-Version': '4.0',
        '__RequestVerificationToken': token || ''
      }
    }).then(function (res) {
      if (!res.ok && res.status !== 204) {
        return res.text().then(function (txt) { throw new Error('HTTP ' + res.status + ' (DELETE) en ' + set + ': ' + txt); });
      }
    });
  }

  function apiGet(url) {
    return fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json', 'OData-MaxVersion': '4.0', 'OData-Version': '4.0' }
    }).then(function (res) {
      return res.text().then(function (txt) {
        if (!res.ok) throw new Error('HTTP ' + res.status + ' (GET): ' + txt);
        return txt ? JSON.parse(txt) : {};
      });
    });
  }

  // Build the [{ nivel, precio }] line-item set from the current CFG state.
  function buildLines(s) {
    var lines = [];
    [['n1', 'Nivel 1'], ['n2', 'Nivel 2'], ['n3', 'Nivel 3'], ['n4', 'Nivel 4']].forEach(function (p) {
      var v = s[p[0]];
      if (v) lines.push({ nivel: p[1] + ' | ' + v.label, precio: Number(v.price || 0) });
    });
    (s.opcionales || []).forEach(function (o) {
      lines.push({ nivel: 'Opcional | ' + o.label, precio: Number(o.price || 0) });
    });
    return lines;
  }

  // Create chained line items under an opportunity reference.
  function createLines(lines, oppRef, token) {
    var chain = Promise.resolve();
    lines.forEach(function (ln) {
      chain = chain.then(function () {
        return apiCreate(SET_LINE, {
          'wi_Oportunidad@odata.bind': oppRef, 'wi_nivel': ln.nivel, 'wi_precio': ln.precio
        }, token);
      });
    });
    return chain;
  }

  // CREATE path: POST a new opportunity + its line items.
  function crearNueva(fase, s, comentario, token) {
    showStatus('Creando pedido...');
    var oppPayload = {
      'wi_ProductoBaseF@odata.bind': '/' + SET_PBF + '(' + s.productobase.id + ')',
      'wi_fase': fase
    };
    if (comentario) oppPayload.wi_comentarios = comentario;
    if (CUENTA_ID) oppPayload['wi_Cuenta@odata.bind'] = '/accounts(' + CUENTA_ID + ')';
    if (CONTACTO_ID) oppPayload['wi_Contacto@odata.bind'] = '/contacts(' + CONTACTO_ID + ')';
    return apiCreate(SET_OPP, oppPayload, token).then(function (res) {
      var oppId = res.id || (res.data && res.data.wi_oportunidadfarmingid);
      if (!oppId) throw new Error('Pedido creado pero no se obtuvo su id.');
      showStatus('Pedido creado. Creando líneas...');
      var lines = buildLines(s);
      return createLines(lines, '/' + SET_OPP + '(' + oppId + ')', token).then(function () { return lines.length; });
    });
  }

  // EDIT path: PATCH the existing opportunity, then reconcile its line items
  // (delete the current set, create the new one). No new opportunity is made.
  function actualizarExistente(fase, s, comentario, token, oppId) {
    showStatus('Actualizando pedido...');
    // Mirror the create payload exactly (the create path does NOT set
    // wi_precioproductobase / wi_preciofinal / wi_preciolineitems — those are
    // populated server-side from wi_ProductoBaseF + the line items — so we
    // don't set them here either, to avoid clobbering that recalculation).
    var oppPayload = { 'wi_fase': fase };
    if (s.productobase && s.productobase.id) {
      oppPayload['wi_ProductoBaseF@odata.bind'] = '/' + SET_PBF + '(' + s.productobase.id + ')';
    }
    oppPayload.wi_comentarios = comentario || null;
    return apiPatch(SET_OPP, oppId, oppPayload, token).then(function () {
      showStatus('Pedido actualizado. Reconciliando líneas...');
      // Fetch the opp's current line items so we can delete them before re-creating.
      var url = '/_api/' + SET_LINE + '?$select=wi_productlineitemsid&$filter=_wi_oportunidad_value eq ' + oppId;
      return apiGet(url);
    }).then(function (data) {
      var existing = (data && data.value) || [];
      var chain = Promise.resolve();
      existing.forEach(function (row) {
        chain = chain.then(function () { return apiDelete(SET_LINE, row.wi_productlineitemsid, token); });
      });
      return chain;
    }).then(function () {
      var lines = buildLines(s);
      return createLines(lines, '/' + SET_OPP + '(' + oppId + ')', token).then(function () { return lines.length; });
    });
  }

  // ---- Confirmation modal (replaces the native confirm()) ----
  var modalLastFocused = null;
  var modalOnConfirm = null;

  function modalKeydown(e) {
    if (e.key === 'Escape' || e.keyCode === 27) closeModal();
  }

  function openModal(message, onConfirm) {
    var overlay = document.getElementById('rsmModal');
    if (!overlay) { // fail-safe: if markup missing, run directly
      if (typeof onConfirm === 'function') onConfirm();
      return;
    }
    document.getElementById('rsmModalBody').textContent = message;
    modalOnConfirm = onConfirm;
    modalLastFocused = document.activeElement;
    overlay.classList.remove('rsm-hidden');
    overlay.setAttribute('aria-hidden', 'false');
    document.addEventListener('keydown', modalKeydown);
    var card = overlay.querySelector('.rsm-modal');
    if (card) card.focus();
  }

  function closeModal() {
    var overlay = document.getElementById('rsmModal');
    if (!overlay) return;
    overlay.classList.add('rsm-hidden');
    overlay.setAttribute('aria-hidden', 'true');
    document.removeEventListener('keydown', modalKeydown);
    modalOnConfirm = null;
    if (modalLastFocused && typeof modalLastFocused.focus === 'function') modalLastFocused.focus();
  }

  function initModal() {
    var si = document.getElementById('rsmModalSi');
    if (si) si.addEventListener('click', function () {
      var fn = modalOnConfirm;
      closeModal();
      if (typeof fn === 'function') fn();
    });
    var no = document.getElementById('rsmModalNo');
    if (no) no.addEventListener('click', closeModal);
    var overlay = document.getElementById('rsmModal');
    if (overlay) overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeModal();
    });
  }

  // Shared save logic. `fase` sets the wi_fase choice value on the opportunity.
  // In edit mode (CFG.editId() set) we PATCH+reconcile instead of POSTing new.
  // The confirmation step is handled by the custom modal in crear(); this runs
  // only after the user confirms.
  function ejecutarCrear(fase, s, isEdit, oppId) {
    setBusy(true);
    var comentario = (document.getElementById('rsmComentario').value || '').trim();

    getToken().then(function (token) {
      return isEdit
        ? actualizarExistente(fase, s, comentario, token, oppId)
        : crearNueva(fase, s, comentario, token);
    }).then(function (count) {
      var msg = isEdit
        ? '✅ Pedido actualizado con ' + count + ' líneas.'
        : '✅ Pedido y ' + count + ' líneas creadas correctamente.';
      showStatus(msg, 'ok');
      // hide both action buttons to avoid double-submit; offer a fresh start
      document.getElementById('rsmCrear').style.display = 'none';
      document.getElementById('rsmPresupuesto').style.display = 'none';
      document.getElementById('rsmNuevo').style.display = 'inline-flex';
      // Edit done: clear the edit flag so a later "Nuevo pedido" starts clean.
      if (isEdit && window.CFG.setEditId) window.CFG.setEditId(null);
      // EDIT path only: after a successful update (opp PATCH + line-items
      // reconcile both resolved — we're inside the success .then, not .catch),
      // redirect to the Oportunidades list. Brief delay so the user sees the
      // "actualizado" message first. The create path stays on this page.
      if (isEdit) {
        setTimeout(function () { window.location.href = '/Oportunidades'; }, 1200);
      }
    }).catch(function (err) {
      showStatus('❌ ' + err.message, 'err');
      setBusy(false);
    });
  }

  // Validate, then ask for confirmation via the custom modal. On confirm we run
  // the unchanged create/PATCH logic (ejecutarCrear); on cancel/backdrop/Escape
  // nothing happens. (Replaces the previous native confirm().)
  function crear(fase) {
    var s = window.CFG.get();
    var oppId = window.CFG.editId ? window.CFG.editId() : null;
    var isEdit = !!oppId;
    if (!isEdit && (!s.productobase || !s.productobase.id)) {
      showStatus('Falta seleccionar el modelo (Producto Base).', 'err');
      return;
    }
    var confirmMsg = isEdit
      ? '¿Actualizar este pedido y sus líneas?'
      : '¿Crear el pedido y las líneas del pedido?';
    openModal(confirmMsg, function () {
      ejecutarCrear(fase, s, isEdit, oppId);
    });
  }

  function solicitarPedido() { crear(FASE_PEDIDO); }       // Fase = Solicitud de pedido (2)
  function crearPresupuesto() { crear(FASE_PRESUPUESTO); } // Fase = Presupuesto / Borrador (1)

  initModal();
  document.addEventListener('cfg:changed', render);
  document.addEventListener('DOMContentLoaded', render);
  render();
</script>
