<nav class="cfg-steps" aria-label="Pasos del configurador">
  <a class="cfg-step{% if current == 'fabricante' %} is-current{% endif %}" data-step="fabricante">Fabricante</a>
  <a class="cfg-step{% if current == 'producto' %} is-current{% endif %}" data-step="producto">Producto</a>
  <a class="cfg-step{% if current == 'productobase' %} is-current{% endif %}" data-step="productobase">Producto Base</a>
  <a class="cfg-step{% if current == 'n1' %} is-current{% endif %}" data-step="n1">Paso 1</a>
  <a class="cfg-step{% if current == 'n2' %} is-current{% endif %}" data-step="n2">Paso 2</a>
  <a class="cfg-step{% if current == 'n3' %} is-current{% endif %}" data-step="n3">Paso 3</a>
  <a class="cfg-step{% if current == 'n4' %} is-current{% endif %}" data-step="n4">Paso 4</a>
  <a class="cfg-step{% if current == 'opcionales' %} is-current{% endif %}" data-step="opcionales">Opcionales</a>
  <a class="cfg-step{% if current == 'resumen' %} is-current{% endif %}" data-step="resumen">Resumen</a>
</nav>
<script>
(function () {
  if (!window.CFG) return;
  function wire() {
    document.querySelectorAll('.cfg-steps .cfg-step').forEach(function (el) {
      if (el.classList.contains('is-current')) return;
      var url = window.CFG.urlFor(el.getAttribute('data-step'));
      if (url) { el.setAttribute('href', url); el.classList.remove('is-disabled'); }
      else { el.classList.add('is-disabled'); }
    });
  }
  wire();
  // Re-wire when state changes (e.g. after async edit-mode pre-load) so the
  // reachable steps light up once the configuration is restored.
  document.addEventListener('cfg:changed', wire);
})();
</script>
