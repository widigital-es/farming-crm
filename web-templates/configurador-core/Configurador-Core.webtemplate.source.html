<script>
(function () {
  var KEY = 'cfgState';
  var STEPS = ['fabricante', 'producto', 'productobase', 'n1', 'n2', 'n3', 'n4', 'opcionales', 'resumen'];
  var PAGE = {
    fabricante: '/cpq', producto: '/producto', productobase: '/producto-base',
    n1: '/n1', n2: '/n2', n3: '/n3', n4: '/n4', opcionales: '/opcionales', resumen: '/resumen'
  };
  // step -> { parentStep, queryParam } used to reach it
  var REACH = {
    producto:     { parent: 'fabricante',   param: 'fabricante' },
    productobase: { parent: 'producto',     param: 'producto' },
    n1:           { parent: 'productobase', param: 'base' },
    n2:           { parent: 'n1',           param: 'n1' },
    n3:           { parent: 'n2',           param: 'n2' },
    n4:           { parent: 'n3',           param: 'n3' },
    opcionales:   { parent: 'n4',           param: 'n4' }
  };
  var LABEL = {
    fabricante: 'Fabricante', producto: 'Producto', productobase: 'Producto Base',
    n1: 'Paso 1', n2: 'Paso 2', n3: 'Paso 3', n4: 'Paso 4', opcionales: 'Opcionales', resumen: 'Resumen'
  };

  function get() { try { return JSON.parse(sessionStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }
  function save(s) { sessionStorage.setItem(KEY, JSON.stringify(s)); document.dispatchEvent(new Event('cfg:changed')); }

  function setStep(key, data) {
    var s = get();
    s[key] = data;
    var i = STEPS.indexOf(key);
    for (var j = i + 1; j < STEPS.length; j++) { delete s[STEPS[j]]; } // invalidate downstream
    save(s);
  }
  function setOpcionales(arr) { var s = get(); s.opcionales = arr; save(s); }
  function clearAll() { sessionStorage.removeItem(KEY); document.dispatchEvent(new Event('cfg:changed')); }

  // ---- EDIT MODE -----------------------------------------------------------
  // When the user clicks "Editar oportunidad" on a Borrador (wi_fase==1) opp,
  // we arrive with ?edit=<oppId>. We fetch the opp + its line items and rebuild
  // the CFG state so Resumen reflects the existing setup, and stash the opp id
  // (inside the state, under __editId) so the save handlers PATCH that opp
  // instead of POSTing a new one. clear()/nuevoPedido() wipes __editId too.
  function editId() { var s = get(); return s.__editId || null; }
  function setEditId(id) { var s = get(); if (id) { s.__editId = id; } else { delete s.__editId; } save(s); }

  // Parse a line item's wi_nivel ("Nivel N | label" / "Opcional | label").
  function parseNivel(raw) {
    if (!raw) return null;
    var i = raw.indexOf('|');
    var head = (i > -1 ? raw.substring(0, i) : raw).trim().toLowerCase();
    var label = (i > -1 ? raw.substring(i + 1) : '').trim();
    var key = null;
    if (head.indexOf('nivel 1') === 0 || head === 'n1') key = 'n1';
    else if (head.indexOf('nivel 2') === 0 || head === 'n2') key = 'n2';
    else if (head.indexOf('nivel 3') === 0 || head === 'n3') key = 'n3';
    else if (head.indexOf('nivel 4') === 0 || head === 'n4') key = 'n4';
    else if (head.indexOf('opcional') === 0) key = 'opcional';
    return key ? { key: key, label: label } : null;
  }

  function apiGet(url) {
    return fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json', 'OData-MaxVersion': '4.0', 'OData-Version': '4.0' }
    }).then(function (res) {
      return res.text().then(function (txt) {
        if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + txt);
        return txt ? JSON.parse(txt) : {};
      });
    });
  }

  // Fetch the opportunity + its line items and rebuild CFG state. Returns a
  // promise. Reconstructs: productobase (id from wi_productobasef, price from
  // wi_precioproductobase, label from related model), n1-n4 + opcionales
  // ({label, price} parsed from each line item's wi_nivel; the original option
  // record ids are NOT stored on the opp/lines, so they cannot be restored —
  // the stepper pages won't re-check, but Resumen + the save reconcile only
  // need {label, price}). Also restores wi_comentarios and the model name.
  //
  // Robustness: the two reads run INDEPENDENTLY (not Promise.all) so a failure
  // in one does not blank the other, and we avoid two query features that the
  // portal Web API rejects with a 400 (which previously killed the whole load
  // and left Resumen empty): (1) $orderby on wi_nivel — Resumen renders by step
  // order anyway, so we don't sort server-side; (2) $expand of the model lookup
  // — we read the flat _wi_productobasef_value + wi_precioproductobase and fetch
  // the model name in a separate, optional GET.
  function fetchOpp(oppId) {
    var url = '/_api/wi_oportunidadfarmings(' + oppId + ')' +
              '?$select=wi_oportunidadfarmingid,_wi_productobasef_value,wi_precioproductobase,wi_comentarios,wi_fase';
    return apiGet(url).catch(function () { return {}; });
  }
  function fetchLines(oppId) {
    var url = '/_api/wi_productlineitemses?$select=wi_nivel,wi_precio' +
              '&$filter=_wi_oportunidad_value eq ' + oppId;
    return apiGet(url).then(function (d) { return (d && d.value) || []; })
                      .catch(function () { return []; });
  }
  // Optional model name/price lookup; never fatal.
  function fetchModelo(pbId) {
    if (!pbId) return Promise.resolve(null);
    var url = '/_api/wi_productobasefarmings(' + pbId + ')?$select=wi_productobasefarmingid,wi_nombreproducto,wi_pvp';
    return apiGet(url).catch(function () { return null; });
  }

  function loadEdit(oppId) {
    if (!oppId) return Promise.resolve(null);
    return fetchOpp(oppId).then(function (opp) {
      opp = opp || {};
      var pbId = opp._wi_productobasef_value || '';
      return fetchModelo(pbId).then(function (pbf) {
        return fetchLines(oppId).then(function (lines) {
          var s = {};
          var hasPrice = opp.wi_precioproductobase != null;
          if (pbId || hasPrice || pbf) {
            s.productobase = {
              id: pbId || (pbf && pbf.wi_productobasefarmingid) || '',
              label: (pbf && pbf.wi_nombreproducto) || '',
              price: Number(hasPrice ? opp.wi_precioproductobase : ((pbf && pbf.wi_pvp) || 0))
            };
          }
          var opc = [];
          lines.forEach(function (ln) {
            var p = parseNivel(ln.wi_nivel);
            if (!p) return;
            var price = Number(ln.wi_precio || 0);
            if (p.key === 'opcional') { opc.push({ id: '', label: p.label, price: price }); }
            else { s[p.key] = { id: '', label: p.label, price: price }; }
          });
          if (opc.length) s.opcionales = opc;
          s.__editId = oppId;
          if (opp.wi_comentarios) s.__comentarios = opp.wi_comentarios;
          save(s); // writes state + dispatches cfg:changed so Resumen re-renders
          return s;
        });
      });
    });
  }

  // On any configurador page, if ?edit=<id> is present and we haven't loaded
  // that opp yet, fetch + rebuild before the page renders. Dispatches
  // cfg:changed when done so Resumen (and the stepper) re-render.
  function bootstrapEdit() {
    var m = location.search.match(/[?&]edit=([^&]+)/);
    if (!m) return;
    var oppId = decodeURIComponent(m[1]).replace(/[{}]/g, '');
    if (editId() === oppId) return; // already loaded this opp into state
    loadEdit(oppId).catch(function (e) {
      try { console.error('Configurador edit load failed:', e); } catch (x) {}
    });
  }

  function priceOf(v) { return v && v.price ? Number(v.price) : 0; }
  function total() {
    var s = get(), t = 0;
    t += priceOf(s.productobase);
    ['n1', 'n2', 'n3', 'n4'].forEach(function (k) { t += priceOf(s[k]); });
    if (s.opcionales) s.opcionales.forEach(function (o) { t += Number(o.price || 0); });
    return t;
  }
  function fmt(n) {
    var parts = Number(n || 0).toFixed(2).split('.');
    var intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.'); // Spanish thousands '.'
    return (parts[1] === '00' ? intPart : intPart + ',' + parts[1]) + ' €';
  }

  function urlFor(key) {
    if (key === 'fabricante') return PAGE.fabricante;
    var s = get();
    // resumen reads everything from sessionStorage; reachable once a model is chosen
    if (key === 'resumen') { return (s.productobase && s.productobase.id) ? PAGE.resumen : null; }
    var r = REACH[key];
    if (!r || !s[r.parent] || !s[r.parent].id) return null;
    return PAGE[key] + '?' + r.param + '=' + s[r.parent].id;
  }

  window.CFG = {
    STEPS: STEPS, LABEL: LABEL, PAGE: PAGE,
    get: get, setStep: setStep, setOpcionales: setOpcionales, clear: clearAll,
    total: total, fmt: fmt, urlFor: urlFor, priceOf: priceOf,
    editId: editId, setEditId: setEditId, loadEdit: loadEdit
  };

  // Pre-load existing opportunity state when arriving via ?edit=<oppId>.
  bootstrapEdit();
})();
</script>

<style>
  .cfg-wrap { max-width: 1180px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    margin-bottom: 1.75rem;

    position: relative;
    padding: 0.6rem 0.15rem 0.9rem;
    font-size: 1rem;
    font-weight: 600;

    background: none;
    border: none;
    cursor: default;
    white-space: nowrap;

     reflows; use a subtle text-shadow for emphasis instead (same trick as

  a.cfg-step:hover { color: #3b4252; text-shadow: 0.3px 0 0 currentColor, -0.3px 0 0 currentColor; text-decoration: none; }
  .cfg-step, a.cfg-step, a.cfg-step:hover, a.cfg-step:focus { text-decoration: none !important; }
  .cfg-step.is-current { color: #1f2a44; text-shadow: 0.3px 0 0 currentColor, -0.3px 0 0 currentColor; }
  .cfg-step.is-current::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 3px;
    background: #2aa9e0;
    border-radius: 3px;
  }
  .cfg-step.is-disabled { color: #c2c8d2; pointer-events: none; }

  /* ---- 2-column layout ---- */
  .cfg-layout { display: flex; gap: 2rem; align-items: flex-start; }
  .cfg-main { flex: 1 1 auto; min-width: 0; }
  .cfg-side { flex: 0 0 340px; width: 340px; position: sticky; top: 1rem; }
  @media (max-width: 900px) {
    .cfg-layout { flex-direction: column; }
    .cfg-side { width: 100%; flex-basis: auto; position: static; }
  }

  /* ---- cards (fabricante / producto) ---- */
  .cfg-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1.25rem; }
  .cfg-card {
    display: flex; flex-direction: column;

  .cfg-card:hover { transform: translateY(-4px); box-shadow: 0 10px 26px rgba(0,0,0,0.14); text-decoration: none; }
  .cfg-card, .cfg-card:hover, .cfg-card:focus, .cfg-card * { text-decoration: none !important; }
  .cfg-card-img { height: 150px; background: #eef2fb center/cover no-repeat; display: flex; align-items: center; justify-content: center; }
  .cfg-card-img img { max-width: 80%; max-height: 80%; object-fit: contain; }
  .cfg-card-body { padding: 0.9rem 1.1rem 1.1rem; }
  .cfg-card-title { font-size: 1.05rem; font-weight: 700; color: #1a2b4a; margin: 0 0 0.6rem; }
  .cfg-card-desc { font-size: 0.85rem; color: #6b7280; line-height: 1.4; margin: 0 0 1.1rem;
                   display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

  /* ---- option list (radios / checkboxes) ---- */
  .cfg-panel { background: #fff; border: 1px solid #eceef1; border-radius: 16px; box-shadow: 0 2px 14px rgba(0,0,0,0.05); overflow: hidden; }
  .cfg-panel-head { padding: 0.9rem 1.25rem; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #9aa3b2; border-bottom: 1px solid #f0f2f5; background: #fafbfc; }
  .cfg-opt { display: flex; align-items: center; gap: 0.85rem; padding: 0.85rem 1.25rem; border-bottom: 1px solid #f4f5f7; cursor: pointer; }
  .cfg-opt:last-child { border-bottom: none; }
  .cfg-opt:hover { background: #f7f8ff; }
  .cfg-opt input { width: 17px; height: 17px; cursor: pointer; flex: 0 0 auto; }
  .cfg-opt-name { flex: 1 1 auto; font-size: 0.96rem; color: #1f2a44; font-weight: 600;
                  overflow: hidden; text-overflow: ellipsis; }
  .cfg-opt-dots { flex: 1 1 auto; border-bottom: 1px dotted #d4d8e0; height: 0; margin: 0 0.25rem; }

  /* ---- nav buttons ---- */
  .cfg-nav { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 1.4rem; border-radius: 999px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; text-decoration: none; border: 1px solid transparent; transition: background 0.15s ease, opacity 0.15s ease;
  }
  .cfg-btn-primary { background: #2aa9e0; color: #fff; }
  .cfg-btn-primary:hover { background: #1f93c7; text-decoration: none; }
  .cfg-btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .cfg-btn-ghost { background: #fff; color: #2aa9e0; border-color: #bfe3f4; }
  .cfg-btn-ghost:hover { background: #f0faff; text-decoration: none; }

  .cfg-h2 { font-size: 1.5rem; font-weight: 700; color: #1a2b4a; margin: 0 0 1.25rem; letter-spacing: -0.01em; }

  /* ---- order summary ---- */
  .cfg-sum-title { font-size: 1.25rem; font-weight: 700; color: #1a2b4a; margin: 0 0 0.9rem; }
  .cfg-sum-card { background: #fff; border: 1px solid #eceef1; border-radius: 14px; box-shadow: 0 2px 14px rgba(0,0,0,0.05); padding: 1.1rem 1.25rem; }

  .cfg-sum-row { margin: 0.7rem 0; }

  .cfg-sum-v .pr { flex: 0 0 auto; white-space: nowrap; }

  .cfg-sum-total .amt { font-size: 1.15rem; }
  .cfg-sum-empty { color: #9aa3b2; font-size: 0.9rem; }

  /* ---- create-order fab ---- */
  .cfg-fab {
    position: fixed; right: 2rem; bottom: 2rem; z-index: 1000;
    display: inline-flex; align-items: center; gap: 0.6rem;
    padding: 0.9rem 1.6rem; border: none; border-radius: 999px;
    background: #2aa9e0; color: #fff; font-size: 1rem; font-weight: 700;
    box-shadow: 0 8px 24px rgba(42,169,224,0.4); cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .cfg-fab:hover:not(:disabled) { transform: translateY(-2px); background: #1f93c7; }
  .cfg-fab:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
  .cfg-fab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; padding: 0 6px; border-radius: 999px; background: rgba(255,255,255,0.25); font-size: 0.85rem; font-weight: 700; }

  .cfg-status { margin: 0 0 1.25rem; padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.95rem; font-weight: 600; background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; white-space: pre-wrap; word-break: break-word; }
  .cfg-status.ok { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .cfg-status.err { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
</style>
