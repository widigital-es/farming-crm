<style>
  /* ===== Footer redesign (darkened sunset background) ===== */
  footer.footer.farming-footer {
    position: relative;
    color: #ffffff;
    background-image: linear-gradient(rgba(12,16,28,0.62), rgba(12,16,28,0.62)),
                      url('https://farmingpalencia.sharepoint.com/sites/CRMLibrary/CRM_DEV/Tools/atardecer-farming-agricola.jpg');
    background-size: cover;
    background-position: center;
    font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;
  }
  .farming-footer .ff-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 3rem 1.25rem 1.5rem;
  }
  .farming-footer .ff-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2.5rem;
    justify-content: space-between;
    align-items: flex-start;
  }
  .farming-footer .ff-col { min-width: 180px; }
  .farming-footer .ff-col h3 {
    color: #ffffff;
    font-size: 1.05rem;
    font-weight: 700;
    margin: 0 0 1rem;
    letter-spacing: 0.2px;
  }
  .farming-footer .ff-col ul { list-style: none; margin: 0; padding: 0; }
  .farming-footer .ff-col li { margin-bottom: 0.6rem; }
  .farming-footer .ff-col a {
    color: #e9eef5;
    text-decoration: none;
    font-size: 0.96rem;
    transition: color 0.15s ease;
  }
  .farming-footer .ff-col a:hover { color: #ffffff; text-decoration: underline; }

  /* Social icons */
  .farming-footer .ff-social { display: flex; flex-wrap: wrap; gap: 0.9rem; }
  .farming-footer .ff-social a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    transition: background-color 0.15s ease, border-color 0.15s ease;
  }
  .farming-footer .ff-social a:hover { background: rgba(255,255,255,0.18); border-color: #ffffff; }
  .farming-footer .ff-social svg { width: 18px; height: 18px; fill: #ffffff; }

  /* Logo / brand on the right */
  .farming-footer .ff-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: #ffffff;
  }
  .farming-footer .ff-brand .ff-brand-mark { width: 46px; height: 46px; flex: 0 0 46px; }
  .farming-footer .ff-brand .ff-brand-mark svg { width: 46px; height: 46px; fill: #ffffff; }
  .farming-footer .ff-brand .ff-brand-text { line-height: 1.05; }
  .farming-footer .ff-brand .ff-brand-text .ff-brand-name {
    display: block;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .farming-footer .ff-brand .ff-brand-text .ff-brand-sub {
    display: block;
    font-size: 1.05rem;
    font-weight: 400;
    opacity: 0.95;
  }

  /* Bottom copyright bar */
  .farming-footer .ff-bottom {
    border-top: 1px solid rgba(255,255,255,0.22);
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .farming-footer .ff-bottom .smallText {
    display: inline;
    margin: 0;
    color: #e9eef5;
    font-size: 0.85rem;
  }

  @media (max-width: 768px) {
    .farming-footer .ff-grid { flex-direction: column; gap: 2rem; }
  }
</style>
